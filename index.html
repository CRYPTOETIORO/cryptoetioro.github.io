<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelarMoney | Premium DEX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F3BA2F; --bg: #08080a;
            --card-bg: rgba(23, 23, 26, 0.7); --input-bg: rgba(0, 0, 0, 0.3);
            --text-main: #ffffff; --text-dim: #98a1c0; --border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #F3BA2F 0%, #f3732f 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(243, 186, 47, 0.08) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(243, 115, 47, 0.05) 0%, transparent 40%);
            color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-weight: 800; font-size: 24px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-connect { background: rgba(243, 186, 47, 0.1); border: 1px solid rgba(243, 186, 47, 0.3); color: var(--primary); padding: 10px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .swap-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 32px; padding: 15px; width: 400px; box-shadow: 0 40px 100px rgba(0,0,0,0.4); }
        .token-section { background: var(--input-bg); border-radius: 24px; padding: 20px; margin-bottom: 8px; border: 1px solid transparent; }
        .label { color: var(--text-dim); font-size: 14px; font-weight: 600; margin-bottom: 12px; display: block; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input { background: transparent; border: none; color: #fff; font-size: 28px; font-weight: 700; width: 60%; outline: none; }
        .token-selector { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 16px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .divider { height: 48px; width: 48px; background: #1c1c1e; border: 4px solid var(--bg); border-radius: 14px; margin: -24px auto; position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; }
        .main-btn { width: 100%; margin-top: 12px; padding: 20px; border-radius: 20px; border: none; background: var(--accent-gradient); color: #000; font-size: 18px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo">TelarMoney</div>
        <button class="btn-connect" id="wBtn" onclick="connectWallet()">Conectar Wallet</button>
    </nav>

    <div class="swap-card">
        <div class="token-section">
            <span class="label">Vendes</span>
            <div class="input-row">
                <input type="number" id="amtIn" placeholder="0.0" oninput="updatePrice()">
                <div class="token-selector">
                    <div style="width:20px; height:20px; border-radius:50%; background:#F3BA2F;"></div>
                    <span>BNB</span>
                </div>
            </div>
        </div>

        <div class="divider">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </div>

        <div class="token-section" style="margin-top:-8px; padding-top:32px;">
            <span class="label">Recibes USDT</span>
            <div class="input-row">
                <input type="number" id="amtOut" placeholder="0.00" readonly>
                <div class="token-selector">
                    <div style="width:20px; height:20px; border-radius:50%; background:#26a17b;"></div>
                    <span>USDT</span>
                </div>
            </div>
        </div>

        <button class="main-btn" id="sBtn" onclick="handleAction()">Conectar Wallet</button>
    </div>

    <script>
        let userAddress = null;
        let provider, signer;
        // Contrato Router de PancakeSwap (No necesita API Key)
        const PAN_ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
        const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
        const USDT = "0x55d398326f99059fF775485246999027B3197955";

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                document.getElementById('wBtn').innerText = userAddress.substring(0,6) + "...";
                updateButton();
            }
        }

        async function updatePrice() {
            const val = document.getElementById('amtIn').value;
            const out = document.getElementById('amtOut');
            if (!val || val <= 0) return;

            try {
                // Usamos un proveedor público de BSC para no depender de API Keys
                const rpcProvider = new ethers.JsonRpcProvider("https://bsc-dataseed.binance.org/");
                const router = new ethers.Contract(PAN_ROUTER, 
                    ["function getAmountsOut(uint amountIn, address[] memory path) public view returns (uint[] memory amounts)"], 
                    rpcProvider);

                const amountIn = ethers.parseEther(val.toString());
                const amounts = await router.getAmountsOut(amountIn, [WBNB, USDT]);
                
                // USDT tiene 18 decimales en BSC
                out.value = parseFloat(ethers.formatUnits(amounts[1], 18)).toFixed(2);
                updateButton();
            } catch (e) { console.error(e); out.placeholder = "Error de red"; }
        }

        function updateButton() {
            const btn = document.getElementById('sBtn');
            btn.innerText = userAddress ? "Intercambiar Ahora" : "Conectar Wallet";
        }

        async function handleAction() {
            if (!userAddress) return connectWallet();
            alert("Intercambio iniciado (Simulación en Mainnet)");
        }
    </script>
</body>
</html>
