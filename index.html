<div class="swap-wrapper">
    <div class="swap-card">
        <div class="token-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span class="label" style="margin-bottom: 0;">Vendes</span>
                <span id="userBalance" style="font-size: 12px; color: var(--text-dim); font-weight: 600;">Balance: 0.00 BNB</span>
            </div>
            <div class="input-row">
                <input type="number" id="amtIn" placeholder="0.0" oninput="updatePrice()" step="any">
                <div class="token-selector">
                    <div style="width:22px; height:22px; border-radius:50%; background:#F3BA2F;"></div>
                    <span>BNB</span>
                </div>
            </div>
        </div>

        <div class="divider">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </div>

        <div class="token-section" style="margin-top:-8px; padding-top:32px;">
            <span class="label">Recibes (Estimado)</span>
            <div class="input-row">
                <input type="text" id="amtOut" placeholder="0.00" readonly>
                <div class="token-selector">
                    <div style="width:22px; height:22px; border-radius:50%; background:#26a17b;"></div>
                    <span>USDT</span>
                </div>
            </div>
        </div>

        <button class="main-btn" id="sBtn" onclick="handleAction()">Conectar Wallet</button>
    </div>
</div>

<script>
    // Variables globales (Asegúrate de que estén definidas arriba en tu script principal)
    // const PAN_ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
    // const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
    // const USDT = "0x55d398326f99059fF775485246999027B3197955";

    async function connectWallet() {
        if (window.ethereum) {
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                
                // Actualizar botón de la nav (si existe el ID wBtn)
                const wBtn = document.getElementById('wBtn');
                if(wBtn) wBtn.innerText = userAddress.substring(0,6) + "...";
                
                // Cargar Balance en tiempo real
                const balance = await provider.getBalance(userAddress);
                const formattedBalance = parseFloat(ethers.formatEther(balance)).toFixed(4);
                document.getElementById('userBalance').innerText = `Balance: ${formattedBalance} BNB`;
                
                updateButton();
                updatePrice(); 
                if(typeof showToast === "function") showToast("Billetera vinculada", false);
            } catch (e) { 
                console.error("Error conexión:", e); 
            }
        }
    }

    async function updatePrice() {
        const val = document.getElementById('amtIn').value;
        const out = document.getElementById('amtOut');
        
        if (!val || val <= 0 || isNaN(val)) { 
            out.value = ""; 
            return; 
        }

        try {
            // RPC de alta disponibilidad
            const rpcProvider = new ethers.JsonRpcProvider("https://binance.llamarpc.com");
            const router = new ethers.Contract(PAN_ROUTER, 
                ["function getAmountsOut(uint amountIn, address[] memory path) view returns (uint[] memory)"], 
                rpcProvider
            );

            // Evitamos errores de precisión limitando a 18 decimales antes de convertir
            const amountIn = ethers.parseEther(parseFloat(val).toFixed(18));
            const amounts = await router.getAmountsOut(amountIn, [WBNB, USDT]);
            
            // USDT en BSC tiene 18 decimales
            const formattedOut = ethers.formatUnits(amounts[1], 18);
            
            // Formateo con comas para miles y 2 decimales
            out.value = parseFloat(formattedOut).toLocaleString('en-US', {
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2
            });
            
            updateButton();
        } catch (e) { 
            console.warn("Error en cotización:", e);
            out.value = "Calculando...";
        }
    }
</script>
